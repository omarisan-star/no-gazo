<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  -webkit-text-size-adjust: 100%;

  touch-action: manipulation;
}
body {
  background: #f0f4f8;
  color: #1e293b;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ===== CSS VARIABLES ===== */
:root {
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --red: #dc2626;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --teal: #0d9488;
  --teal-light: #ccfbf1;
  --orange: #ea580c;
  --orange-light: #ffedd5;
  --surface: #f0f4f8;
  --white: #ffffff;
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding-top: var(--safe-top);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.header-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 700;
  color: var(--blue);
}
.header-title svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}
.home-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border: none;
  background: var(--surface);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  transition: background 0.15s, color 0.15s;
}
.home-btn:active { background: var(--border); }
.home-btn svg { width: 22px; height: 22px; }

/* ===== BREADCRUMB ===== */
.breadcrumb {
  padding: 0 16px 8px;
  max-width: 600px;
  margin: 0 auto;
  font-size: 12px;
  color: var(--text-muted);
  display: none;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.breadcrumb.visible { display: flex; }
.breadcrumb span { white-space: nowrap; }
.breadcrumb .sep { color: var(--border); }
.breadcrumb .crumb-link {
  color: var(--blue);
  cursor: pointer;
  text-decoration: none;
}
.breadcrumb .crumb-link:active { text-decoration: underline; }

/* ===== SEARCH ===== */
.search-wrap {
  padding: 8px 16px 12px;
  max-width: 600px;
  margin: 0 auto;
}
.search-box {
  position: relative;
}
.search-box svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  height: 44px;
  padding: 0 40px 0 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  font-family: inherit;
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-muted);
  display: none;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.search-clear.visible { display: flex; }
.search-clear:active { background: var(--surface); }
.search-clear svg { width: 18px; height: 18px; }

/* ===== MAIN CONTENT ===== */
.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 120px;
}

/* ===== NAV BUTTONS ===== */
.nav-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  min-height: 56px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: transform 0.1s, box-shadow 0.15s, border-color 0.15s;
  box-shadow: var(--shadow-sm);
}
.nav-btn:active {
  transform: scale(0.98);
  box-shadow: none;
}
.nav-btn .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.nav-btn .btn-text {
  flex: 1;
  min-width: 0;
}
.nav-btn .btn-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}
.nav-btn .btn-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  line-height: 1.3;
}
.nav-btn .arrow {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ===== SECTION HEADER ===== */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding-bottom: 8px;
}
.section-header .icon-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.section-header h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

/* ===== CONTENT CARD ===== */
.content-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.card-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.card-header .card-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 8px;
}
.card-header h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}
.card-header .page-ref {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.card-header .page-ref span {
  font-weight: 600;
  color: var(--blue);
}

.card-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.card-section:last-child { border-bottom: none; }
.card-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-section-title .label-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.card-section ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-section li {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
  padding-left: 16px;
  position: relative;
}
.card-section li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
}
.card-section .vessel-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  background: var(--blue-light);
  color: var(--blue);
}

/* ===== COLLAPSIBLE ===== */
.collapsible-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 14px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.collapsible-toggle:last-of-type { border-bottom: none; }
.collapsible-toggle .toggle-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.collapsible-toggle .toggle-title .label-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.collapsible-toggle .chevron {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.collapsible-toggle.open .chevron { transform: rotate(180deg); }
.collapsible-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.collapsible-content.open {
  max-height: 2000px;
}
.collapsible-inner {
  padding: 0 16px 14px;
}
.collapsible-inner ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.collapsible-inner li {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
  padding-left: 16px;
  position: relative;
}
.collapsible-inner li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
}

/* ===== RELATED LINKS ===== */
.related-links {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}
.related-links .rl-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.related-links .rl-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.related-links .rl-chip {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface);
  color: var(--blue);
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.15s;
  font-family: inherit;
}
.related-links .rl-chip:active {
  background: var(--blue-light);
}

/* ===== SEARCH RESULTS ===== */
.search-results {
  display: none;
}
.search-results.visible { display: block; }
.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 16px;
  border: none;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: background 0.1s;
}
.search-result-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.search-result-item:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.search-result-item:only-child { border-radius: var(--radius); }
.search-result-item:active { background: var(--surface); }
.search-result-item .sr-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.search-result-item .sr-text { flex: 1; min-width: 0; }
.search-result-item .sr-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.search-result-item .sr-path {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.search-result-item .arrow {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.search-no-result {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 14px;
}

/* ===== BACK BUTTON ===== */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  margin-bottom: 12px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--blue);
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.back-btn:active { background: var(--blue-light); }
.back-btn svg { width: 18px; height: 18px; }

/* ===== VIEW TRANSITIONS ===== */
.view { animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== FOOTER ===== */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  z-index: 50;
}
.footer a {
  color: var(--text-muted);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.footer a:hover { color: var(--text-secondary); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 0; }

/* ===== UTILITIES ===== */
.hidden { display: none !important; }

/* ===== PAGE VIEWER BUTTON ===== */
.page-viewer-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  height: 48px;
  min-height: 48px;
  border: none;
  border-radius: 10px;
  background: var(--blue);
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.page-viewer-btn:active {
  background: #1d4ed8;
  transform: scale(0.98);
}

/* ===== IMAGE VIEWER MODAL ===== */
.img-viewer-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  -webkit-user-select: none;
  user-select: none;
}
.img-viewer-overlay.open {
  display: flex;
}
body.viewer-open {
  overflow: hidden !important;
  position: fixed;
  width: 100%;
}
body.viewer-open .header,
body.viewer-open .footer {
  visibility: hidden;
}

/* Close button */
.iv-close {
  position: absolute;
  top: max(12px, env(safe-area-inset-top, 12px));
  right: 12px;
  width: 44px;
  height: 44px;
  border: none;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1010;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.iv-close:active { background: rgba(255,255,255,0.3); }

/* Navigation arrows */
.iv-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: none;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  color: #fff;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1010;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: background 0.15s;
}
.iv-nav:active { background: rgba(255,255,255,0.3); }
.iv-nav.prev { left: 8px; }
.iv-nav.next { right: 8px; }
.iv-nav:disabled { opacity: 0.3; pointer-events: none; }

/* Image container */
.iv-image-area {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  touch-action: none;
}
.iv-image-area img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  transition: transform 0.05s linear;
  will-change: transform;
  pointer-events: none;
}

/* Page indicator */
.iv-indicator {
  position: absolute;
  bottom: max(20px, calc(env(safe-area-inset-bottom, 20px) + 8px));
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 20px;
  white-space: nowrap;
  z-index: 1010;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  font-family: 'Noto Sans JP', sans-serif;
}
</style>

<header class="header">

<main class="main" id="app"></main>

      '主幹動脈（ICA, MCA, ACA, PCA, BA）から分岐する穿通枝動脈',
      'レンズ核線条体動脈・視床穿通動脈の走行',
      '穿通枝動脈の臨床的重要性'
    ],
    related: ['perforator', 'mra_read', 'cortical_art']
  },
  axial_art: {
    title: '横断像上の脳動脈支配領域',
    pages: 'p.95',
    cat: '機能解剖',
    keypoints: [
      '各横断像レベルでの動脈支配領域の色分け',
      '梗塞巣と責任血管の対応の理解'
    ],
    related: ['cortical_art', 'art_variation', 'trunk_perf']
  },
  art_variation: {
    title: '脳動脈の支配領域の個人差',
    pages: 'p.96-99',
    cat: '機能解剖',
    keypoints: [
      '動脈支配領域には個人差がある',
      'ACA-MCA境界の変動',
      'PCA-MCA境界の変動',
      '臨床での支配領域推定時の注意点'
    ],
    related: ['axial_art', 'cortical_art', 'ica']
  }
};

// ===== APP STATE =====
let navPath = []; // Stack of node IDs
let searchMode = false;

// ===== HELPERS =====
function findNode(id, node = NAV_TREE) {
  if (node.id === id) return node;
  if (node.children) {
    for (const child of node.children) {
      const found = findNode(id, child);
      if (found) return found;
    }
  }
  return null;
}

function getColorForCat(cat) {
  return COLORS[cat] || COLORS['基礎'];
}

function getAllContentNodes(node = NAV_TREE, path = []) {
  let results = [];
  if (node.content) {
    results.push({ id: node.id, contentId: node.content, label: node.label, cat: node.cat, path: [...path] });
  }
  if (node.children) {
    const newPath = node.id === 'root' ? path : [...path, node.label];
    for (const child of node.children) {
      results = results.concat(getAllContentNodes(child, newPath));
    }
  }
  return results;
}

const allContentNodes = getAllContentNodes();

// ===== SVG ICONS =====
const ARROW_SVG = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
const BACK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
const CHEVRON_DOWN = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

// ===== RENDER =====
const app = document.getElementById('app');
const breadcrumb = document.getElementById('breadcrumb');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

function render() {
  if (searchMode) return;
  
  const currentNode = navPath.length === 0 
    ? NAV_TREE 
    : findNode(navPath[navPath.length - 1]);
  
  if (!currentNode) { goHome(); return; }
  
  // If this node has content, show content
  if (currentNode.content) {
    renderContent(currentNode.content, currentNode.cat);
    updateBreadcrumb();
    return;
  }
  
  // Otherwise show navigation
  renderNav(currentNode);
  updateBreadcrumb();
}

function renderNav(node) {
  const children = node.children || [];
  const isRoot = node.id === 'root';
  
  let html = '<div class="view">';
  
  if (!isRoot) {
    html += `<button class="back-btn" onclick="goBack()">${BACK_SVG} 戻る</button>`;
    const c = getColorForCat(node.cat);
    html += `<div class="section-header">
      <div class="icon-circle" style="background:${c.bg}; color:${c.color}; font-size:16px;">🧠</div>
      <h2>${node.label}</h2>
    </div>`;
  }
  
  html += '<div class="nav-grid">';
  
  for (const child of children) {
    const c = getColorForCat(child.cat);
    const hasContent = !!child.content;
    const hasChildren = !!(child.children && child.children.length);
    html += `<button class="nav-btn" onclick="navigate('${child.id}')">
      <div class="dot" style="background:${c.color}"></div>
      <div class="btn-text">
        <div class="btn-title">${child.label}</div>
        ${child.sub ? `<div class="btn-sub">${child.sub}</div>` : ''}
      </div>
      ${ARROW_SVG}
    </button>`;
  }
  
  html += '</div></div>';
  app.innerHTML = html;
}

function renderContent(contentId, cat) {
  const data = CONTENT[contentId];
  if (!data) { goBack(); return; }
  
  const c = getColorForCat(data.cat || cat);
  
  let html = '<div class="view">';
  html += `<button class="back-btn" onclick="goBack()">${BACK_SVG} 戻る</button>`;
  
  html += '<div class="content-card">';
  
  // Header
  html += `<div class="card-header">
    <div class="card-badge" style="background:${c.bg}; color:${c.color}">${data.cat}</div>
    <h3>${data.title}</h3>
    <div class="page-ref">📖 書籍 <span>${data.pages}</span> を参照</div>
    <button class="page-viewer-btn" onclick="openPageViewer('${data.pages}')">📖 ページを見る (${data.pages})</button>
  </div>`;
  
  // Vessel (if exists)
  if (data.vessel) {
    html += `<div class="card-section">
      <div class="card-section-title"><div class="label-dot" style="background:${c.color}"></div>責任血管</div>
      <div class="vessel-tag">${data.vessel}</div>
    </div>`;
  }
  
  // Key points (always visible)
  if (data.keypoints && data.keypoints.length) {
    html += `<div class="card-section">
      <div class="card-section-title"><div class="label-dot" style="background:${c.color}"></div>キーポイント</div>
      <ul>${data.keypoints.map(k => `<li>${k}</li>`).join('')}</ul>
    </div>`;
  }
  
  // Symptoms (collapsible)
  if (data.symptoms && data.symptoms.length) {
    const sid = 'symp_' + contentId;
    html += `<button class="collapsible-toggle" onclick="toggleCollapse('${sid}', this)">
      <div class="toggle-title"><div class="label-dot" style="background:${c.color}"></div>主な症候</div>
      ${CHEVRON_DOWN}
    </button>
    <div class="collapsible-content" id="${sid}">
      <div class="collapsible-inner">
        <ul>${data.symptoms.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
    </div>`;
  }
  
  // Rehab points (collapsible)
  if (data.reha && data.reha.length) {
    const rid = 'reha_' + contentId;
    html += `<button class="collapsible-toggle" onclick="toggleCollapse('${rid}', this)">
      <div class="toggle-title"><div class="label-dot" style="background:#0d9488"></div>リハビリの着目点</div>
      ${CHEVRON_DOWN}
    </button>
    <div class="collapsible-content" id="${rid}">
      <div class="collapsible-inner">
        <ul>${data.reha.map(r => `<li>${r}</li>`).join('')}</ul>
      </div>
    </div>`;
  }
  
  // Related links
  if (data.related && data.related.length) {
    html += `<div class="related-links">
      <div class="rl-title">関連セクション</div>
      <div class="rl-list">
        ${data.related.map(rid => {
          const rData = CONTENT[rid];
          if (!rData) return '';
          const rc = getColorForCat(rData.cat);
          return `<button class="rl-chip" onclick="navigateToContent('${rid}')" style="border-color:${rc.color}22; color:${rc.color}">${rData.title}</button>`;
        }).join('')}
      </div>
    </div>`;
  }
  
  html += '</div></div>';
  app.innerHTML = html;
  
  // Auto-expand symptoms and reha on load
  setTimeout(() => {
    if (data.symptoms && data.symptoms.length) {
      const sEl = document.getElementById('symp_' + contentId);
      const sBtn = sEl?.previousElementSibling;
      if (sEl && sBtn) { sEl.classList.add('open'); sBtn.classList.add('open'); }
    }
    if (data.reha && data.reha.length) {
      const rEl = document.getElementById('reha_' + contentId);
      const rBtn = rEl?.previousElementSibling;
      if (rEl && rBtn) { rEl.classList.add('open'); rBtn.classList.add('open'); }
    }
  }, 50);
}

function updateBreadcrumb() {
  if (navPath.length === 0) {
    breadcrumb.classList.remove('visible');
    breadcrumb.innerHTML = '';
    return;
  }
  
  breadcrumb.classList.add('visible');
  let crumbs = [];
  for (let i = 0; i < navPath.length; i++) {
    const node = findNode(navPath[i]);
    if (!node) continue;
    const label = node.label.length > 12 ? node.label.substring(0, 12) + '…' : node.label;
    if (i < navPath.length - 1) {
      crumbs.push(`<span class="crumb-link" onclick="navigateTo(${i})">${label}</span>`);
    } else {
      crumbs.push(`<span>${label}</span>`);
    }
  }
  breadcrumb.innerHTML = crumbs.join('<span class="sep">›</span>');
}

// ===== NAVIGATION =====
function navigate(id) {
  navPath.push(id);
  searchMode = false;
  searchInput.value = '';
  searchClear.classList.remove('visible');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateTo(index) {
  navPath = navPath.slice(0, index + 1);
  searchMode = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateToContent(contentId) {
  // Find the node with this content and build path
  const found = findContentPath(contentId, NAV_TREE, []);
  if (found) {
    navPath = found;
    searchMode = false;
    searchInput.value = '';
    searchClear.classList.remove('visible');
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function findContentPath(contentId, node, path) {
  if (node.content === contentId) {
    return [...path, node.id];
  }
  if (node.children) {
    const newPath = node.id === 'root' ? path : [...path, node.id];
    for (const child of node.children) {
      const found = findContentPath(contentId, child, newPath);
      if (found) return found;
    }
  }
  return null;
}

function goBack() {
  if (navPath.length > 0) {
    navPath.pop();
  }
  searchMode = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  navPath = [];
  searchMode = false;
  searchInput.value = '';
  searchClear.classList.remove('visible');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== SEARCH =====
function performSearch(query) {
  if (!query.trim()) {
    searchMode = false;
    render();
    return;
  }
  
  searchMode = true;
  const q = query.toLowerCase();
  const results = [];
  
  for (const node of allContentNodes) {
    const data = CONTENT[node.contentId];
    if (!data) continue;
    
    // Search in title, symptoms, vessel, keypoints, reha
    const searchText = [
      data.title || '',
      (data.symptoms || []).join(' '),
      data.vessel || '',
      (data.keypoints || []).join(' '),
      (data.reha || []).join(' '),
      data.cat || '',
      node.label || ''
    ].join(' ').toLowerCase();
    
    if (searchText.includes(q)) {
      results.push({ node, data });
    }
  }
  
  renderSearchResults(results, query);
}

function renderSearchResults(results, query) {
  let html = '<div class="view">';
  
  if (results.length === 0) {
    html += `<div class="search-no-result">「${query}」に一致する項目がありません</div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${results.length}件の結果</div>`;
    html += '<div style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-sm);">';
    for (const { node, data } of results) {
      const c = getColorForCat(data.cat);
      const pathStr = node.path.length > 0 ? node.path.join(' › ') + ' › ' + data.pages : data.pages;
      html += `<button class="search-result-item" onclick="navigateToContent('${node.contentId}')">
        <div class="sr-dot" style="background:${c.color}"></div>
        <div class="sr-text">
          <div class="sr-title">${data.title}</div>
          <div class="sr-path">${pathStr}</div>
        </div>
        ${ARROW_SVG}
      </button>`;
    }
    html += '</div>';
  }
  
  html += '</div>';
  app.innerHTML = html;
}

// ===== COLLAPSIBLE =====
function toggleCollapse(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

// ===== EVENT LISTENERS =====
let searchTimeout;
searchInput.addEventListener('input', (e) => {
  const val = e.target.value;
  searchClear.classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => performSearch(val), 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  searchMode = false;
  render();
});

// ===== IMAGE VIEWER =====
const imgViewer = document.getElementById('imgViewer');
const ivImage = document.getElementById('ivImage');
const ivIndicator = document.getElementById('ivIndicator');
const ivClose = document.getElementById('ivClose');
const ivPrev = document.getElementById('ivPrev');
const ivNext = document.getElementById('ivNext');
const ivImageArea = document.getElementById('ivImageArea');

let viewerPages = [];      // array of page numbers
let viewerIndex = 0;       // current index
let viewerScrollY = 0;     // stored scroll position

// Zoom & Pan state
let ivScale = 1;
let ivTransX = 0;
let ivTransY = 0;
let ivPinchStartDist = 0;
let ivPinchStartScale = 1;
let ivPanStartX = 0;
let ivPanStartY = 0;
let ivPanStartTX = 0;
let ivPanStartTY = 0;
let ivIsPanning = false;
let ivIsPinching = false;

// Swipe state
let swipeStartX = 0;
let swipeStartY = 0;
let swipeDeltaX = 0;
let swipeActive = false;

function parsePageRange(pageStr) {
  // Formats: "p.122-129", "p.173", "p.12-13"
  const match = pageStr.match(/p\.(\d+)(?:-(\d+))?/);
  if (!match) return [];
  const start = parseInt(match[1], 10);
  const end = match[2] ? parseInt(match[2], 10) : start;
  const pages = [];
  for (let i = start; i <= end; i++) {
    pages.push(i);
  }
  return pages;
}

function pageToFile(num) {
  return 'pages/p' + String(num).padStart(3, '0') + '.jpg';
}

function openPageViewer(pageStr) {
  viewerPages = parsePageRange(pageStr);
  if (viewerPages.length === 0) return;
  viewerIndex = 0;
  resetTransform();
  showViewerPage();
  viewerScrollY = window.scrollY;
  document.body.classList.add('viewer-open');
  document.body.style.top = -viewerScrollY + 'px';
  imgViewer.classList.add('open');
}

function closePageViewer() {
  imgViewer.classList.remove('open');
  document.body.classList.remove('viewer-open');
  document.body.style.top = '';
  window.scrollTo(0, viewerScrollY);
  ivImage.src = '';
}

function showViewerPage() {
  const pageNum = viewerPages[viewerIndex];
  ivImage.src = pageToFile(pageNum);
  const total = viewerPages.length;
  const pos = viewerIndex + 1;
  ivIndicator.textContent = `p.${pageNum} / ${total}ページ中 ${pos}ページ目`;
  ivPrev.disabled = viewerIndex <= 0;
  ivNext.disabled = viewerIndex >= viewerPages.length - 1;
  resetTransform();
}

function resetTransform() {
  ivScale = 1;
  ivTransX = 0;
  ivTransY = 0;
  applyTransform();
}

function applyTransform() {
  ivImage.style.transform = `translate(${ivTransX}px, ${ivTransY}px) scale(${ivScale})`;
}

function clampPan() {
  if (ivScale <= 1) {
    ivTransX = 0;
    ivTransY = 0;
    return;
  }
  const rect = ivImageArea.getBoundingClientRect();
  const imgW = ivImage.naturalWidth || rect.width;
  const imgH = ivImage.naturalHeight || rect.height;
  // Displayed size
  const dispW = Math.min(imgW, rect.width);
  const dispH = Math.min(imgH, rect.height);
  const scaledW = dispW * ivScale;
  const scaledH = dispH * ivScale;
  const maxX = Math.max(0, (scaledW - rect.width) / 2);
  const maxY = Math.max(0, (scaledH - rect.height) / 2);
  ivTransX = Math.max(-maxX, Math.min(maxX, ivTransX));
  ivTransY = Math.max(-maxY, Math.min(maxY, ivTransY));
}

// Close button
ivClose.addEventListener('click', closePageViewer);

// Nav buttons
ivPrev.addEventListener('click', () => {
  if (viewerIndex > 0) { viewerIndex--; showViewerPage(); }
});
ivNext.addEventListener('click', () => {
  if (viewerIndex < viewerPages.length - 1) { viewerIndex++; showViewerPage(); }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!imgViewer.classList.contains('open')) return;
  if (e.key === 'Escape') closePageViewer();
  if (e.key === 'ArrowLeft' && viewerIndex > 0) { viewerIndex--; showViewerPage(); }
  if (e.key === 'ArrowRight' && viewerIndex < viewerPages.length - 1) { viewerIndex++; showViewerPage(); }
});

// Touch events for swipe and pinch-to-zoom
function getTouchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

ivImageArea.addEventListener('touchstart', (e) => {
  if (!imgViewer.classList.contains('open')) return;
  
  if (e.touches.length === 2) {
    // Pinch start
    ivIsPinching = true;
    swipeActive = false;
    ivPinchStartDist = getTouchDist(e.touches[0], e.touches[1]);
    ivPinchStartScale = ivScale;
    e.preventDefault();
  } else if (e.touches.length === 1) {
    if (ivScale > 1) {
      // Pan mode
      ivIsPanning = true;
      swipeActive = false;
      ivPanStartX = e.touches[0].clientX;
      ivPanStartY = e.touches[0].clientY;
      ivPanStartTX = ivTransX;
      ivPanStartTY = ivTransY;
    } else {
      // Swipe mode
      swipeActive = true;
      ivIsPanning = false;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swipeDeltaX = 0;
    }
  }
}, { passive: false });

ivImageArea.addEventListener('touchmove', (e) => {
  if (!imgViewer.classList.contains('open')) return;
  
  if (ivIsPinching && e.touches.length === 2) {
    e.preventDefault();
    const dist = getTouchDist(e.touches[0], e.touches[1]);
    const newScale = ivPinchStartScale * (dist / ivPinchStartDist);
    ivScale = Math.max(1, Math.min(5, newScale));
    if (ivScale <= 1) {
      ivTransX = 0;
      ivTransY = 0;
    }
    applyTransform();
  } else if (ivIsPanning && e.touches.length === 1) {
    e.preventDefault();
    const dx = e.touches[0].clientX - ivPanStartX;
    const dy = e.touches[0].clientY - ivPanStartY;
    ivTransX = ivPanStartTX + dx;
    ivTransY = ivPanStartTY + dy;
    clampPan();
    applyTransform();
  } else if (swipeActive && e.touches.length === 1) {
    swipeDeltaX = e.touches[0].clientX - swipeStartX;
    const deltaY = Math.abs(e.touches[0].clientY - swipeStartY);
    // Only prevent default if horizontal swipe dominates
    if (Math.abs(swipeDeltaX) > deltaY && Math.abs(swipeDeltaX) > 10) {
      e.preventDefault();
    }
  }
}, { passive: false });

ivImageArea.addEventListener('touchend', (e) => {
  if (!imgViewer.classList.contains('open')) return;
  
  if (ivIsPinching) {
    ivIsPinching = false;
    if (ivScale <= 1) resetTransform();
    return;
  }
  
  if (ivIsPanning) {
    ivIsPanning = false;
    clampPan();
    applyTransform();
    return;
  }
  
  if (swipeActive) {
    swipeActive = false;
    const threshold = 50;
    if (swipeDeltaX < -threshold && viewerIndex < viewerPages.length - 1) {
      viewerIndex++;
      showViewerPage();
    } else if (swipeDeltaX > threshold && viewerIndex > 0) {
      viewerIndex--;
      showViewerPage();
    }
  }
});

// Double-tap to zoom
let lastTapTime = 0;
ivImageArea.addEventListener('click', (e) => {
  if (!imgViewer.classList.contains('open')) return;
  const now = Date.now();
  if (now - lastTapTime < 300) {
    // Double tap
    if (ivScale > 1) {
      resetTransform();
    } else {
      ivScale = 2.5;
      // Zoom towards tap position
      const rect = ivImageArea.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      ivTransX = (cx - e.clientX) * (ivScale - 1) / ivScale;
      ivTransY = (cy - e.clientY) * (ivScale - 1) / ivScale;
      clampPan();
      applyTransform();
    }
    lastTapTime = 0;
  } else {
    lastTapTime = now;
  }
});

// Click overlay background to close (not on image or buttons)
imgViewer.addEventListener('click', (e) => {
  if (e.target === imgViewer) closePageViewer();
});

// ===== INIT =====
render();
</script>
